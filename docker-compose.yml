version: "3.9"

services:

  db:
    image: postgres:16
    container_name: meteorology-db
    restart: always
    environment:
      POSTGRES_DB: meteorology
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - ./docker:/docker-entrypoint-initdb.d